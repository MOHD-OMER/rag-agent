version: "3.9"

# ============================================================
# Multi-Document RAG Chatbot — Docker Compose
# ============================================================
#
# Services:
#   backend   — FastAPI REST API (port 8000)
#   frontend  — Streamlit UI    (port 8501)
#   gradio    — Gradio UI       (port 7860)
#
# Quick start:
#   1. Copy .env.example to .env and fill in API keys
#   2. docker compose up --build
#   3. Open http://localhost:8501 (Streamlit) or http://localhost:7860 (Gradio)
# ============================================================

services:
  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/chroma_db
      - upload_data:/app/uploads
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - ALLOWED_ORIGINS=http://localhost:8501,http://localhost:7860,http://frontend:8501,http://gradio:7860
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Gradio (HuggingFace-compatible) Frontend ─────────────
  gradio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-gradio
    command: python frontend/gradio_app.py
    ports:
      - "7860:7860"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
    restart: unless-stopped

  # ── Ollama (optional local LLM) ──────────────────────────
  # Uncomment to use Ollama instead of Groq:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: rag-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  upload_data:
    driver: local
  # ollama_data:
  #   driver: local

networks:
  default:
    name: rag-network
